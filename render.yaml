services:
  # API Server
  - type: web
    name: DevilCoder-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && chmod +x /usr/local/bin/yt-dlp
      npm install -g pnpm
      pnpm install --frozen-lockfile
      pnpm run typecheck:libs
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: YTDLP_PATH
        value: /usr/local/bin/yt-dlp
      - key: DATABASE_URL
        fromDatabase:
          name: devilcoder-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

  # Frontend (static site)
  - type: web
    name: devilcoder-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: |
      npm install -g pnpm
      pnpm install --frozen-lockfile
      pnpm run typecheck:libs
      pnpm --filter @workspace/api-spec run codegen
      BASE_PATH=/ pnpm --filter @workspace/soundforge run build
    staticPublishPath: artifacts/soundforge/dist/public
    routes:
      - type: rewrite
        source: /api/*
        destination: https://DevilCoder-api.onrender.com/api/$1
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: devilcoder-db
    databaseName: devilcoder
    plan: free
